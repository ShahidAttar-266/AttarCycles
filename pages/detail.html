<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Details | Attar Cycles Marketplace</title>
    <link rel="stylesheet" href="../styles/variables.css">
    <link rel="stylesheet" href="../styles/main.css">
    <style>
        .pdp-grid { grid-template-columns: 1fr 1fr; }
        .pdp-gallery img { border-radius: var(--border-radius-lg); width: 100%; height: 400px; object-fit: cover; }
        .pdp-thumbnails { display: flex; gap: 8px; margin-top: 12px; }
        .pdp-thumbnails img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; cursor: pointer; opacity: 0.6; }
        .pdp-thumbnails img.active { opacity: 1; border: 2px solid var(--primary-color); }
        .info-pill { padding: 4px 12px; background: var(--bg-alt); border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        .enquiry-card { background: white; border: 1px solid var(--border-color); border-radius: var(--border-radius-lg); padding: var(--spacing-lg); position: sticky; top: 100px; }
        
        /* Modal Styles */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 3000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: var(--spacing-lg); border-radius: var(--border-radius-lg); width: 100%; max-width: 500px; }
    </style>
</head>
<body>
    <header class="navbar sticky" id="main-header"></header>

    <main class="container py-xl" style="padding-top: var(--spacing-xl);">
        <div class="grid grid-cols-2 gap-3" id="pdp-wrapper">
            <!-- Loading -->
            <div style="grid-column: span 2; text-align: center; padding: 100px;">Loading cycle details...</div>
        </div>
    </main>

    <!-- Enquiry Modal -->
    <div id="enquiry-modal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-2">
                <h3>Order Enquiry</h3>
                <button id="close-modal"><i data-lucide="x"></i></button>
            </div>
            <p class="text-xs text-muted mb-4">You are enquiring about: <span id="enquiry-p-name" class="font-bold"></span></p>
            <form id="enquiry-form" class="grid gap-2">
                <div class="form-group">
                    <label class="text-xs font-bold">Your Name</label>
                    <input type="text" name="name" required class="w-full p-sm rounded border">
                </div>
                <div class="form-group">
                    <label class="text-xs font-bold">Phone Number</label>
                    <input type="tel" name="phone" required class="w-full p-sm rounded border">
                </div>
                <div class="form-group">
                    <label class="text-xs font-bold">City</label>
                    <input type="text" name="city" required class="w-full p-sm rounded border">
                </div>
                <div class="form-group">
                    <label class="text-xs font-bold">Address</label>
                    <textarea name="address" required class="w-full p-sm rounded border"></textarea>
                </div>
                <input type="hidden" name="product_id" id="enquiry-p-id">
                <button type="submit" class="btn btn-primary w-full mt-2" id="submit-enquiry">Submit My Request</button>
            </form>
            <div id="enquiry-success" class="text-center py-4" style="display: none;">
                <i data-lucide="check-circle" style="width: 48px; height: 48px; color: var(--secondary-color); margin-bottom: 12px;"></i>
                <h4>Request Submitted!</h4>
                <p class="text-xs text-muted">We will contact you within 24 hours.</p>
                <button class="btn btn-outline btn-sm mt-4" onclick="location.reload()">Done</button>
            </div>
        </div>
    </div>

    <div id="whatsapp-fab" class="whatsapp-fab"></div>
    <footer id="main-footer"></footer>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="../scripts/pages/detail.js"></script>
</body>
</html>
